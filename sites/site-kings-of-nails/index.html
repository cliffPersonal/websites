<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGS OF NAILS – Premium Nail Salon in Monterey Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            color: #2d3142;
            background-color: #ffffff;
            line-height: 1.6;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: #ffffff;
            border-bottom: 1px solid #e8eef5;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(58, 95, 138, 0.08);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            height: 70px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #3a5f8a;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-weight: 600;
            color: #2d3142;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: #3a5f8a;
        }

        /* Hamburger Menu */
        .hamburger-checkbox {
            display: none;
        }

        .hamburger-label {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger-label span {
            width: 25px;
            height: 3px;
            background: #3a5f8a;
            border-radius: 2px;
            transition: 0.3s;
        }

        .hamburger-checkbox:checked ~ .nav-links {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            background: #ffffff;
            border-bottom: 1px solid #e8eef5;
            padding: 1.5rem 2rem;
            gap: 1rem;
        }

        /* Hero Section */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            min-height: 600px;
            background: linear-gradient(135deg, #3a5f8a 0%, #2d4563 100%);
            overflow: hidden;
        }

        .hero-content {
            padding: 4rem;
            color: #ffffff;
            animation: fadeInLeft 0.8s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .hero h1 {
            font-size: 3.2rem;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .hero .tagline {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            opacity: 0.95;
        }

        .cta-button {
            display: inline-block;
            background: #ffffff;
            color: #3a5f8a;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%235a7fa3;stop-opacity:1" /><stop offset="100%" style="stop-color:%233a5f8a;stop-opacity:1" /></linearGradient></defs><rect width="600" height="600" fill="url(%23grad)"/><circle cx="300" cy="200" r="80" fill="%23ffffff" opacity="0.1"/><circle cx="150" cy="400" r="60" fill="%23ffffff" opacity="0.08"/><circle cx="450" cy="350" r="100" fill="%23ffffff" opacity="0.06"/></svg>') center/cover;
            animation: fadeInRight 0.8s ease;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* About Section */
        .about {
            padding: 4rem 2rem;
            background: #f9fafc;
        }

        .about-content {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .about h2 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            color: #3a5f8a;
        }

        .about p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 1rem;
            color: #2d3142;
        }

        /* Services Section */
        .services {
            padding: 4rem 2rem;
            background: #ffffff;
        }

        .services h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 3rem;
            color: #3a5f8a;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: linear-gradient(135deg, #f9fafc 0%, #f0f4f9 100%);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #e8eef5;
            animation: fadeInUp 0.8s ease;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(58, 95, 138, 0.15);
            border-color: #3a5f8a;
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .service-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: #3a5f8a;
        }

        .service-card p {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
        }

        /* Hours Section */
        .hours {
            padding: 4rem 2rem;
            background: #f9fafc;
        }

        .hours-container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        .hours h2 {
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: #3a5f8a;
            text-align: center;
        }

        .hours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .hour-item {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #3a5f8a;
            box-shadow: 0 2px 8px rgba(58, 95, 138, 0.08);
        }

        .hour-item strong {
            color: #3a5f8a;
            font-size: 1.05rem;
        }

        .hour-item p {
            color: #555;
            margin-top: 0.5rem;
        }

        /* Contact Section */
        .contact {
            padding: 4rem 2rem;
            background: #ffffff;
        }

        .contact-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        .contact h2 {
            font-size: 2.2rem;
            margin-bottom: 3rem;
            color: #3a5f8a;
            text-align: center;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .contact-info {
            background: #f9fafc;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #e8eef5;
        }

        .contact-info h3 {
            color: #3a5f8a;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .contact-item {
            margin-bottom: 1.5rem;
        }

        .contact-item strong {
            display: block;
            color: #3a5f8a;
            margin-bottom: 0.5rem;
        }

        .contact-item a {
            color: #2d3142;
            transition: color 0.3s ease;
        }

        .contact-item a:hover {
            color: #3a5f8a;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: #3a5f8a;
            color: #ffffff;
            border-radius: 50%;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .social-links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(58, 95, 138, 0.3);
        }

        .map-container {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e8eef5;
            box-shadow: 0 4px 12px rgba(58, 95, 138, 0.1);
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, #3a5f8a 0%, #2d4563 100%);
            color: #ffffff;
            padding: 3rem 2rem;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        footer h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        footer p {
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        footer .copyright {
            font-size: 0.9rem;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }

        /* Page Navigation */
        .page-nav {
            display: flex;
            gap: 2rem;
            justify-content: center;
            padding: 3rem 2rem;
            background: #f9fafc;
        }

        .page-nav a {
            padding: 0.75rem 1.5rem;
            background: #3a5f8a;
            color: #ffffff;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .page-nav a:hover {
            background: #2d4563;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hamburger-label {
                display: flex;
            }

            .hamburger-checkbox:checked ~ .hamburger-label span:nth-child(1) {
                transform: rotate(45deg) translate(10px, 10px);
            }

            .hamburger-checkbox:checked ~ .hamburger-label span:nth-child(2) {
                opacity: 0;
            }

            .hamburger-checkbox:checked ~ .hamburger-label span:nth-child(3) {
                transform: rotate(-45deg) translate(8px, -8px);
            }

            .hero {
                grid-template-columns: 1fr;
                min-height: auto;
                padding: 2rem 0;
            }

            .hero-content {
                padding: 2rem;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero-image {
                display: none;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .map-container iframe {
                height: 300px;
            }

            .about, .services, .hours, .contact, footer {
                padding: 2.5rem 1.5rem;
            }

            .about h2, .services h2, .hours h2, .contact h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .nav-container {
                padding: 0 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .hero .tagline {
                font-size: 1rem;
            }

            .cta-button {
                padding: 0.8rem 2rem;
                font-size: 0.95rem;
            }

            .services-grid, .hours-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">KINGS OF NAILS</div>
            <input type="checkbox" id="hamburger" class="hamburger-checkbox">
            <label for="hamburger" class="hamburger-label">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <ul class="nav-links">
